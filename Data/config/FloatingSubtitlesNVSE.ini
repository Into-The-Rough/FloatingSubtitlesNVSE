[Settings]

;offset above head in game units
fHeadOffset = 15

;max distance to show subtitles
fMaxDistance = 2048

;distance at which subtitles start fading
fFadeStartDistance = 1536

;show speaker name above subtitle
bShowSpeakerName = 1

;require line of sight to show subtitle (if 0, shows in off-screen area when no LOS)
bRequireLOS = 0

;subtitle text scale multiplier
fSubtitleScale = 1

;0=keep on screen edge, 1=circular edge, 2=hide when offscreen
iOffScreenHandling = 0

;font number (1-8, default 3)
iFont = 3

;font size as zoom percentage (default 100.0)
fFontSize = 80

;off-screen subtitle vertical position (0.0=top, 1.0=bottom, default 0.85)
fOffScreenY = 0.85

;floating world subtitle wrap width (pixels)
fFloatingWrapWidth = 400

;center/off-screen subtitle wrap width (pixels)
fCenterWrapWidth = 700

;suppress dialogue-topic lines briefly after Dialogue Menu closes (0/1)
bSuppressMenuDialogueTail = 1

;tail window in seconds for suppressing recent Dialogue Menu topic infos
fMenuDialogueTailSeconds = 1.2

;animate same-speaker line replacements if previous subtitle is still visible (0/1)
bAnimateInterruptReplace = 1

;seconds for interrupt transition animation
fInterruptAnimSeconds = 0.16

;starting alpha multiplier for interrupt transition (0.0-1.0)
fInterruptFadeFloor = 0.35

;normalized upward slide amount during interrupt transition
fInterruptSlideNorm = 0.010

;fade-in newly created subtitles (non-replacements) to mask tile reuse artifacts (0/1)
bFadeInNewSubtitles = 1

;seconds for new subtitle fade-in (0 disables)
fNewSubtitleFadeSeconds = 0.08

;experimental: horizontally separate overlapping floating subtitles (0/1)
bResolveSubtitleOverlap = 1

;normalized subtitle box size used for overlap detection/resolution
fOverlapBoxWidthNorm = 0.22
fOverlapBoxHeightNorm = 0.08

;extra normalized horizontal spacing between resolved subtitle boxes
fOverlapPaddingNorm = 0.02

;max normalized horizontal shift from actor anchor when resolving overlap
fOverlapMaxShiftNorm = 0.20
